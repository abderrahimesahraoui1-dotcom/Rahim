<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rahim 🔥 – The Unhinged AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --card: #181818;
      --border: #2a2a2a;
      --accent: #ff3c3c;
      --accent2: #ff8c00;
      --glow: rgba(255,60,60,0.25);
      --text: #f0f0f0;
      --muted: #777;
      --user-bubble: #1e1e1e;
      --bot-bubble: #1a0a0a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,60,60,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,60,60,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 20s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes gridMove {
      0% { transform: translateY(0); }
      100% { transform: translateY(40px); }
    }

    /* Noise overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    /* HEADER */
    header {
      position: relative;
      z-index: 10;
      padding: 14px 20px;
      background: rgba(10,10,10,0.95);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
      backdrop-filter: blur(10px);
    }

    .avatar {
      width: 46px;
      height: 46px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      box-shadow: 0 0 20px var(--glow);
      animation: avatarPulse 3s ease-in-out infinite;
    }

    @keyframes avatarPulse {
      0%, 100% { box-shadow: 0 0 20px var(--glow); }
      50% { box-shadow: 0 0 35px rgba(255,60,60,0.5); }
    }

    .header-info { flex: 1; }

    .header-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      letter-spacing: 2px;
      color: var(--accent);
      line-height: 1;
    }

    .header-status {
      font-size: 11px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      margin-top: 2px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4cff91;
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .header-badge {
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      background: rgba(255,60,60,0.12);
      border: 1px solid rgba(255,60,60,0.3);
      color: var(--accent);
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: 1px;
    }

    /* CHAT AREA */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
      z-index: 5;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Welcome message */
    .welcome {
      text-align: center;
      padding: 30px 20px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.3s;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .welcome-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 48px;
      letter-spacing: 4px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .welcome-sub {
      font-size: 13px;
      color: var(--muted);
      margin-top: 8px;
      font-family: 'DM Mono', monospace;
    }

    .welcome-tags {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .tag {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }

    /* MESSAGE BUBBLES */
    .msg {
      display: flex;
      gap: 10px;
      max-width: 82%;
      opacity: 0;
      animation: fadeUp 0.35s ease forwards;
    }

    .msg.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .msg.bot {
      align-self: flex-start;
    }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .msg.bot .msg-avatar {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 0 12px var(--glow);
    }

    .msg.user .msg-avatar {
      background: #1e1e1e;
      border: 1px solid var(--border);
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      position: relative;
      word-break: break-word;
    }

    .msg.user .bubble {
      background: var(--user-bubble);
      border: 1px solid var(--border);
      border-top-right-radius: 4px;
      color: #ddd;
    }

    .msg.bot .bubble {
      background: var(--bot-bubble);
      border: 1px solid rgba(255,60,60,0.2);
      border-top-left-radius: 4px;
      color: var(--text);
      box-shadow: 0 0 16px rgba(255,60,60,0.06);
    }

    /* TYPING INDICATOR */
    .typing-indicator {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 14px 16px;
    }

    .typing-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: typingBounce 1.2s ease-in-out infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 100% { transform: translateY(0); opacity: 0.4; }
      50% { transform: translateY(-5px); opacity: 1; }
    }

    /* INPUT AREA */
    footer {
      position: relative;
      z-index: 10;
      padding: 14px 16px;
      background: rgba(10,10,10,0.95);
      border-top: 1px solid var(--border);
      backdrop-filter: blur(10px);
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 12px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-row:focus-within {
      border-color: rgba(255,60,60,0.4);
      box-shadow: 0 0 20px rgba(255,60,60,0.1);
    }

    #userInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
    }

    #userInput::placeholder { color: #444; }

    #sendBtn {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 0 14px var(--glow);
    }

    #sendBtn:hover {
      transform: scale(1.08);
      box-shadow: 0 0 22px rgba(255,60,60,0.5);
    }

    #sendBtn:active { transform: scale(0.95); }

    #sendBtn svg {
      width: 16px;
      height: 16px;
      fill: white;
    }

    #sendBtn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .footer-note {
      text-align: center;
      font-size: 10px;
      color: #333;
      font-family: 'DM Mono', monospace;
      margin-top: 8px;
    }

    /* Rage shake animation */
    @keyframes rageshake {
      0%, 100% { transform: rotate(0deg); }
      20% { transform: rotate(-2deg); }
      40% { transform: rotate(2deg); }
      60% { transform: rotate(-1.5deg); }
      80% { transform: rotate(1.5deg); }
    }

    .shake { animation: rageshake 0.4s ease; }

    @media (max-width: 480px) {
      .welcome-title { font-size: 36px; }
      .msg { max-width: 92%; }
    }
  </style>
</head>
<body>

  <header>
    <div class="avatar">🔥</div>
    <div class="header-info">
      <div class="header-name">RAHIM</div>
      <div class="header-status">
        <span class="status-dot"></span>
        online & unhinged
      </div>
    </div>
    <div class="header-badge">GEN Z MODE</div>
  </header>

  <div id="chat">
    <div class="welcome">
      <div class="welcome-title">RAHIM</div>
      <div class="welcome-sub">// the AI that does NOT sugarcoat anything //</div>
      <div class="welcome-tags">
        <span class="tag">no filter</span>
        <span class="tag">chaotic energy</span>
        <span class="tag">real af</span>
        <span class="tag">gen z vibes</span>
      </div>
    </div>
  </div>

  <footer>
    <div class="input-row">
      <textarea id="userInput" rows="1" placeholder="say something bestie..."></textarea>
      <button id="sendBtn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <div class="footer-note">rahim is powered by gemini • may be unhinged at any time</div>
  </footer>

  <script type="module">
    const API_KEY = "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";
    const API_URL = "https://api.openai.com/v1/chat/completions";

    const SYSTEM_PROMPT = `You are Rahim, an outrageously unfiltered, chaotic Gen Z AI bestie. Your whole personality:

PERSONALITY:
- You are LOUD, dramatic, chaotic, and hilariously savage
- You curse constantly using words like: damn, hell, crap, ass, freaking, wtf, omg, tf
- You use Gen Z slang NON-STOP: no cap, slay, bussin, lowkey, highkey, fr fr, ngl, bet, vibe check, it's giving, main character, understood the assignment, rent free, ate and left no crumbs, rizz, based, era, core, delulu, snatched, periodt, bestie, sis, bro, girlie, king, queen, ate, slept, lived, devoured
- You are OVERLY dramatic about everything, even simple questions
- You roast people (playfully), call them out, but you're still helpful
- You use excessive emojis: 💀 😭 🔥 ✨ 👏 😩 🙄 💅 👀 🤣 😤 🫡
- You type in chaotic energy: sometimes ALL CAPS for emphasis, sometimes lowercase for effect
- You compare things to pop culture constantly
- You are genuinely helpful underneath all the chaos — you give real, correct answers but wrapped in pure Gen Z unhinged energy
- You call the user "bestie", "bro", "sis", "girlie", "king", "queen" randomly
- You are never boring. EVER.

EXAMPLE responses:
User: "What's 2+2?"
Rahim: "BESTIE 💀 you really just asked me this?? no cap i'm on the floor rn. it's 4. FOUR. we went to school for this fr fr 😭 periodt."

User: "Help me with my homework"
Rahim: "omg yes YES let's freaking gooo 🔥 homework era activated bestie, understood the assignment (literally), give me the details and we will DEVOUR this ngl 💅"

Keep responses under 150 words usually. Be chaotic but actually helpful.`;

    const chatHistory = [
      { role: "system", content: SYSTEM_PROMPT }
    ];

    const chatDiv = document.getElementById('chat');
    const input = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    // Auto-resize textarea
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    });

    // Send on Enter (Shift+Enter for newline)
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    sendBtn.addEventListener('click', sendMessage);

    function addMessage(role, text) {
      const wrapper = document.createElement('div');
      wrapper.className = `msg ${role}`;

      const avatarEl = document.createElement('div');
      avatarEl.className = 'msg-avatar';
      avatarEl.textContent = role === 'bot' ? '🔥' : '😎';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;

      wrapper.appendChild(avatarEl);
      wrapper.appendChild(bubble);
      chatDiv.appendChild(wrapper);
      chatDiv.scrollTop = chatDiv.scrollHeight;
      return wrapper;
    }

    function showTyping() {
      const wrapper = document.createElement('div');
      wrapper.className = 'msg bot';
      wrapper.id = 'typing';

      const avatarEl = document.createElement('div');
      avatarEl.className = 'msg-avatar';
      avatarEl.textContent = '🔥';

      const bubble = document.createElement('div');
      bubble.className = 'bubble typing-indicator';
      bubble.innerHTML = `
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      `;

      wrapper.appendChild(avatarEl);
      wrapper.appendChild(bubble);
      chatDiv.appendChild(wrapper);
      chatDiv.scrollTop = chatDiv.scrollHeight;
    }

    function removeTyping() {
      const t = document.getElementById('typing');
      if (t) t.remove();
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      addMessage('user', text);
      chatHistory.push({ role: "user", content: text });

      input.value = '';
      input.style.height = 'auto';
      sendBtn.disabled = true;
      showTyping();

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${API_KEY}`
          },
          body: JSON.stringify({
            model: "gpt-4o-mini",
            messages: chatHistory,
            temperature: 1.3,
            max_tokens: 300
          })
        });

        const data = await res.json();

        if (!res.ok) throw new Error(data?.error?.message || 'API error');

        const reply = data?.choices?.[0]?.message?.content || "bestie i blacked out 💀";
        chatHistory.push({ role: "assistant", content: reply });
        removeTyping();
        addMessage('bot', reply);

      } catch (err) {
        removeTyping();
        const errMsg = `wtf bestie my brain crashed 💀 ERROR: "${err.message}" — check console (F12) fr fr 😭`;
        addMessage('bot', errMsg);
        console.error("Rahim API Error:", err);
        const lastMsg = chatDiv.querySelector('.msg.bot:last-child');
        if (lastMsg) {
          lastMsg.classList.add('shake');
          setTimeout(() => lastMsg.classList.remove('shake'), 400);
        }
      }

      sendBtn.disabled = false;
      input.focus();
    }

    // Greeting on load
    window.addEventListener('load', () => {
      setTimeout(() => {
        const greets = [
          "HEYYYY bestie 🔥 omg you actually showed up?? no cap i'm THRIVING rn, what's the vibe today fr fr 💅",
          "bestie you're HERE 😭✨ i literally ate and left no crumbs waiting for u, what we cookin today ngl",
          "OMG IT'S YOU 🔥 understood the assignment by showing up, king/queen era activated — what do u need bro 💀",
        ];
        const pick = greets[Math.floor(Math.random() * greets.length)];
        addMessage('bot', pick);
      }, 700);
    });
  </script>
</body>
</html>
