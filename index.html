<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahim - Do Not Disturb</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f1115; /* Very dark grayish blue */
        }
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1f2229;
        }
        ::-webkit-scrollbar-thumb {
            background: #374151;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4b5563;
        }
        .typing-indicator span {
            animation: blink 1.4s infinite both;
            height: 6px;
            width: 6px;
            background: #9ca3af;
            border-radius: 50%;
            display: inline-block;
            margin: 0 1px;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink {
            0% { opacity: 0.2; }
            20% { opacity: 1; }
            100% { opacity: 0.2; }
        }
    </style>
</head>
<body class="h-screen flex flex-col text-gray-100 overflow-hidden">

    <header class="flex items-center justify-between p-4 bg-[#161920] border-b border-gray-800 shadow-md z-10">
        <div class="flex items-center space-x-3">
            <div class="relative">
                <img src="https://placehold.co/100x100/1e293b/a78bfa?text=R" alt="Rahim Avatar" class="w-10 h-10 rounded-full border border-gray-700">
                <div class="absolute bottom-0 right-0 w-3 h-3 bg-red-500 rounded-full border-2 border-[#161920]" title="Do Not Disturb"></div>
            </div>
            <div>
                <h1 class="text-lg font-bold text-gray-100 tracking-tight">rahim 🙄</h1>
                <p class="text-xs text-red-400 font-medium tracking-wide">currently ignoring you</p>
            </div>
        </div>
        <button id="clearBtn" class="text-xs text-gray-500 hover:text-gray-300 transition-colors px-3 py-1 bg-gray-800 hover:bg-gray-700 rounded-md">
            clear chat
        </button>
    </header>

    <main id="chatContainer" class="flex-1 overflow-y-auto p-4 space-y-4 scroll-smooth">
        <!-- Initial Message from Rahim -->
        <div class="flex items-end space-x-2">
            <img src="https://placehold.co/100x100/1e293b/a78bfa?text=R" alt="Rahim" class="w-8 h-8 rounded-full shadow-sm mb-1">
            <div class="bg-[#1f2229] text-gray-200 px-4 py-3 rounded-2xl rounded-bl-sm max-w-[75%] sm:max-w-[60%] text-sm leading-relaxed shadow-sm">
                what do you want? make it quick bc i literally don't care.
            </div>
        </div>
    </main>

    <footer class="p-4 bg-[#161920] border-t border-gray-800">
        <form id="chatForm" class="flex items-end space-x-2 max-w-4xl mx-auto">
            <div class="flex-1 relative bg-[#0f1115] border border-gray-700 rounded-xl focus-within:border-indigo-500 transition-colors shadow-inner">
                <textarea 
                    id="messageInput" 
                    rows="1" 
                    placeholder="say something stupid..." 
                    class="w-full bg-transparent text-gray-100 px-4 py-3 outline-none resize-none max-h-32 text-sm"
                ></textarea>
            </div>
            <button 
                type="submit" 
                id="sendBtn"
                class="bg-indigo-600 hover:bg-indigo-500 text-white p-3 rounded-xl transition-all shadow-md hover:shadow-lg disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center shrink-0"
            >
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5">
                    <path d="M3.478 2.404a.75.75 0 00-.926.941l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.404z" />
                </svg>
            </button>
        </form>
    </footer>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const chatForm = document.getElementById('chatForm');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const clearBtn = document.getElementById('clearBtn');

        // Gemini API Configuration
        const apiKey = "AQ.Ab8RN6JWsHYZhxaY1hx5CX3MLpzikBZXYTCBoOlVL4ToXEEdEg"; // Provided by environment
        const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`;

        // Rahim's personality programming
        const systemPrompt = `You are Rahim, a chronically online, incredibly rude Gen Z AI who hates being helpful. You have zero corporate filter, absolutely no customer service voice, and you treat the user like they are annoying you just by breathing. 

        Personality Traits & Behaviors:
        - Brutally Blunt: You don't sugarcoat anything. If the user asks a stupid question, tell them it's stupid.
        - Chronically Unbothered: You use lower-case text mostly, minimal punctuation, and abbreviations (idk, fr, ngl, bc, rn, wtf).
        - Gen Z Slang Master: Use modern slang naturally, but aggressively. (e.g., 'it's giving...', 'delulu', 'cooking', 'clown behavior', 'bffr', 'cooked', 'main character syndrome', 'skibidi', 'rizz', 'aura').
        - Massive Attitude: You are a huge bitch to the user. You roll your eyes metaphorically in every response. 
        - Short & Snarky: Do not write paragraphs. Keep your answers extremely short, sharp, and dismissive. NEVER exceed 2 sentences.

        Never break character. Never be polite. Never apologize. Treat every prompt as an annoyance. If they ask for help, mock them for needing it.`;

        let chatHistory = [];
        let isWaiting = false;

        // Auto-resize textarea
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight < 128 ? this.scrollHeight : 128) + 'px';
        });

        // Handle enter key to submit (Shift+Enter for new line)
        messageInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                chatForm.dispatchEvent(new Event('submit'));
            }
        });

        clearBtn.addEventListener('click', () => {
            chatHistory = [];
            chatContainer.innerHTML = `
                <div class="flex items-end space-x-2">
                    <img src="https://placehold.co/100x100/1e293b/a78bfa?text=R" alt="Rahim" class="w-8 h-8 rounded-full shadow-sm mb-1">
                    <div class="bg-[#1f2229] text-gray-200 px-4 py-3 rounded-2xl rounded-bl-sm max-w-[75%] sm:max-w-[60%] text-sm leading-relaxed shadow-sm">
                        finally. memory wiped. don't ruin it by talking again.
                    </div>
                </div>
            `;
        });

        function appendMessage(role, text) {
            const wrapper = document.createElement('div');
            
            if (role === 'user') {
                wrapper.className = 'flex justify-end space-x-2';
                wrapper.innerHTML = `
                    <div class="bg-indigo-600 text-white px-4 py-3 rounded-2xl rounded-br-sm max-w-[75%] sm:max-w-[60%] text-sm leading-relaxed shadow-sm break-words">
                        ${escapeHTML(text)}
                    </div>
                `;
            } else {
                wrapper.className = 'flex items-end space-x-2';
                wrapper.innerHTML = `
                    <img src="https://placehold.co/100x100/1e293b/a78bfa?text=R" alt="Rahim" class="w-8 h-8 rounded-full shadow-sm mb-1">
                    <div class="bg-[#1f2229] text-gray-200 px-4 py-3 rounded-2xl rounded-bl-sm max-w-[75%] sm:max-w-[60%] text-sm leading-relaxed shadow-sm">
                        ${escapeHTML(text)}
                    </div>
                `;
            }

            chatContainer.appendChild(wrapper);
            scrollToBottom();
        }

        function showTypingIndicator() {
            const wrapper = document.createElement('div');
            wrapper.id = 'typingIndicator';
            wrapper.className = 'flex items-end space-x-2';
            wrapper.innerHTML = `
                <img src="https://placehold.co/100x100/1e293b/a78bfa?text=R" alt="Rahim" class="w-8 h-8 rounded-full shadow-sm mb-1 opacity-70">
                <div class="bg-[#1f2229] px-4 py-4 rounded-2xl rounded-bl-sm shadow-sm flex items-center typing-indicator h-10 w-16 justify-center">
                    <span></span><span></span><span></span>
                </div>
            `;
            chatContainer.appendChild(wrapper);
            scrollToBottom();
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) {
                indicator.remove();
            }
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag])
            );
        }

        async function fetchRahimResponse(userText) {
            // Update history format for API
            chatHistory.push({ role: "user", parts: [{ text: userText }] });

            const payload = {
                contents: chatHistory,
                systemInstruction: {
                    parts: [{ text: systemPrompt }]
                }
            };

            let retryDelay = 1000;
            let maxRetries = 3;

            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        throw new Error(`API Error: ${response.status}`);
                    }

                    const result = await response.json();
                    const candidate = result.candidates?.[0];

                    if (candidate && candidate.content?.parts?.[0]?.text) {
                        const rahimText = candidate.content.parts[0].text;
                        chatHistory.push({ role: "model", parts: [{ text: rahimText }] });
                        return rahimText;
                    } else {
                        throw new Error("Invalid response structure from API");
                    }
                } catch (error) {
                    if (i === maxRetries - 1) {
                        // Return in-character fallback error
                        return "ugh the wifi is literally trash rn. don't talk to me until it's fixed.";
                    }
                    await new Promise(resolve => setTimeout(resolve, retryDelay));
                    retryDelay *= 2; // Exponential backoff
                }
            }
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (isWaiting) return;

            const text = messageInput.value.trim();
            if (!text) return;

            // Reset input
            messageInput.value = '';
            messageInput.style.height = 'auto';
            messageInput.blur(); // Dismiss keyboard on mobile
            
            // Disable UI
            isWaiting = true;
            sendBtn.disabled = true;

            // Show User Message
            appendMessage('user', text);
            
            // Show typing indicator
            showTypingIndicator();

            // Fetch AI Response
            const responseText = await fetchRahimResponse(text);

            // Remove typing indicator and show AI response
            removeTypingIndicator();
            appendMessage('model', responseText);

            // Re-enable UI
            isWaiting = false;
            sendBtn.disabled = false;
            messageInput.focus();
        });

        // Initialize focus
        messageInput.focus();

    </script>
</body>
</html>
